<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" role="img"
     aria-label="Illustrative reference race: the WebGPU bar finishes far ahead of the CPU bar at n = 10,000.">
  <!-- Illustrative schematic, NOT a hardware capture: two affinity-race lanes
       loop on a 6s cycle, the WebGPU lane finishing ~26x sooner than CPU. The
       real recorded clip lands with the launch assets (task-55.10). Animation is
       authored in CSS (not SMIL) so it can be disabled under
       prefers-reduced-motion — a constantly-looping image is a vestibular
       hazard, so reduced-motion visitors get the finished frame held static. -->
  <defs>
    <linearGradient id="gpu-fill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3bc9a0" />
      <stop offset="1" stop-color="#63e6be" />
    </linearGradient>
    <linearGradient id="cpu-fill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5b73c4" />
      <stop offset="1" stop-color="#7c9cff" />
    </linearGradient>
    <style>
      .bar { transform-box: fill-box; transform-origin: left center; }
      .gpu-bar { animation: gpu-fill 6s linear infinite; }
      .cpu-bar { animation: cpu-fill 6s linear infinite; }
      .gpu-time { opacity: 0; animation: gpu-label 6s linear infinite; }
      .cpu-time, .verdict { opacity: 0; animation: cpu-label 6s linear infinite; }
      @keyframes gpu-fill {
        0% { transform: scaleX(0); }
        3.5% { transform: scaleX(1); }
        98% { transform: scaleX(1); }
        100% { transform: scaleX(0); }
      }
      @keyframes cpu-fill {
        0% { transform: scaleX(0); }
        92% { transform: scaleX(1); }
        98% { transform: scaleX(1); }
        100% { transform: scaleX(0); }
      }
      @keyframes gpu-label {
        0%, 3.5% { opacity: 0; }
        5%, 98% { opacity: 1; }
        100% { opacity: 0; }
      }
      @keyframes cpu-label {
        0%, 92% { opacity: 0; }
        94%, 98% { opacity: 1; }
        100% { opacity: 0; }
      }
      /* Honour reduced-motion: stop looping and hold the finished frame so the
         payoff is still visible without any movement. */
      @media (prefers-reduced-motion: reduce) {
        .gpu-bar, .cpu-bar { animation: none; transform: scaleX(1); }
        .gpu-time, .cpu-time, .verdict { animation: none; opacity: 1; }
      }
    </style>
  </defs>

  <rect x="0" y="0" width="720" height="220" rx="14" fill="#11162a" />
  <rect x="0.5" y="0.5" width="719" height="219" rx="14" fill="none"
        stroke="rgba(124,156,255,0.18)" />

  <text x="24" y="32" fill="#e6edf3" font-family="system-ui, sans-serif"
        font-size="16" font-weight="700">WebGPU vs CPU — Spectral RBF affinity</text>
  <!-- Persistent, un-animated honesty tag: the numbers below are a schematic, not
       a measurement from the visitor's machine. -->
  <text x="24" y="52" fill="#ffa94d" font-family="system-ui, sans-serif"
        font-size="12" font-weight="700" letter-spacing="0.06em">ILLUSTRATIVE — NOT A LIVE MEASUREMENT</text>
  <text x="696" y="32" text-anchor="end" fill="#8b949e"
        font-family="system-ui, sans-serif" font-size="14">n = 10,000 · d = 100</text>

  <!-- WebGPU lane -->
  <text x="24" y="98" fill="#63e6be" font-family="system-ui, sans-serif"
        font-size="14" font-weight="700">WebGPU</text>
  <rect x="110" y="80" width="500" height="26" rx="8" fill="rgba(124,156,255,0.12)" />
  <rect class="bar gpu-bar" x="110" y="80" width="500" height="26" rx="8" fill="url(#gpu-fill)" />
  <text class="gpu-time" x="696" y="98" text-anchor="end" fill="#63e6be"
        font-family="system-ui, sans-serif" font-size="14" font-weight="700">≈ 38 ms</text>

  <!-- CPU lane -->
  <text x="24" y="160" fill="#7c9cff" font-family="system-ui, sans-serif"
        font-size="14" font-weight="700">CPU</text>
  <rect x="110" y="142" width="500" height="26" rx="8" fill="rgba(124,156,255,0.12)" />
  <rect class="bar cpu-bar" x="110" y="142" width="500" height="26" rx="8" fill="url(#cpu-fill)" />
  <text class="cpu-time" x="696" y="160" text-anchor="end" fill="#7c9cff"
        font-family="system-ui, sans-serif" font-size="14" font-weight="700">≈ 1,000 ms</text>

  <text class="verdict" x="360" y="204" text-anchor="middle" fill="#e6edf3"
        font-family="system-ui, sans-serif" font-size="15" font-weight="800">WebGPU ≈ 26× faster</text>
</svg>
