<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='10' cy='12' r='4' fill='%237c9cff'/%3E%3Ccircle cx='22' cy='11' r='4' fill='%2363e6be'/%3E%3Ccircle cx='16' cy='23' r='4' fill='%23ffa94d'/%3E%3C/svg%3E"
    />
    <title>clustering-tfjs — GPU-accelerated clustering in your browser</title>
    <meta
      name="description"
      content="scikit-learn clustering, GPU-accelerated, 100% in your browser — no Python, no install."
    />
    <meta property="og:title" content="clustering-tfjs" />
    <meta
      property="og:description"
      content="scikit-learn clustering, GPU-accelerated, 100% in your browser — no Python, no install."
    />
  </head>
  <body>
    <main class="hero">
      <p class="eyebrow">clustering-tfjs</p>
      <h1 class="hook">
        scikit-learn clustering,
        <span class="accent">GPU-accelerated</span>, 100% in your browser
      </h1>
      <p class="subhook">No Python. No install.</p>

      <div class="cluster-dots" aria-hidden="true">
        <span class="dot dot-a"></span>
        <span class="dot dot-b"></span>
        <span class="dot dot-c"></span>
      </div>

      <p class="status">
        <span class="status-pill">Preview</span>
        A live WebGPU&nbsp;vs&nbsp;CPU clustering race and the familiar
        scikit-learn toy-dataset grid.
      </p>

      <div class="race-harness">
        <button id="run-race" type="button">Run the race</button>
        <pre id="race-output" class="race-output" aria-live="polite"></pre>
      </div>

      <a class="repo-link" href="https://github.com/CRJFisher/clustering-tfjs"
        >View the library on GitHub →</a
      >
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
