name: Deploy Site

# Build on every PR (the guard that keeps the live-demo link from rotting) and
# on push to main (build + deploy). workflow_dispatch allows a manual re-deploy
# without a new commit.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Least-privilege scopes for the Pages deploy chain:
#   contents: read   -> checkout
#   pages: write     -> publish the Pages deployment
#   id-token: write  -> mint the OIDC token deploy-pages exchanges with Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          # The site has its own lockfile, independent of the library root.
          cache-dependency-path: site/package-lock.json

      # Install ONLY the site's deps — never the library root. The marketing
      # site builds independently of the published package.
      - name: Install site dependencies
        run: npm ci
        working-directory: site

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Fails the whole workflow if the bundle stops building. On PRs this is the
      # only thing that runs, so a broken site never reaches main.
      - name: Build site
        run: npm run build
        working-directory: site

      # Path is repo-root-relative, so it must be site/dist (the Vite outDir).
      # Only the runs that can deploy need the artifact; PRs are a build-only
      # guard, so skip the upload for them.
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    # PRs are a build-only guard and never publish; a push to main or a manual
    # workflow_dispatch deploys.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    # Serialize Pages publishes. cancel-in-progress is false so an in-flight
    # deploy finishes rather than leaving the site half-published. Scoped to the
    # deploy job so PR guard builds never queue behind a publish.
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
