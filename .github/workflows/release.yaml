name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for tagging
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
      
      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build package
        run: npm run build:multi
      
      - name: Verify all platform builds
        run: |
          echo "=== Verifying platform builds ==="
          for file in dist/clustering.browser.js dist/clustering.node.js dist/index.js dist/index.esm.js dist/index.d.ts; do
            if [ ! -f "$file" ]; then
              echo "ERROR: Missing required build file: $file"
              exit 1
            fi
            echo "✓ Found: $file ($(ls -lh $file | awk '{print $5}'))"
          done
          echo "All platform builds verified!"
      
      - name: Publish to npm
        run: |
          npm config delete //registry.npmjs.org/:_authToken
          npm publish --provenance --access public --ignore-scripts
      
      - name: Extract release notes from PR
        id: release_notes
        run: |
          # Save PR body to file
          cat << 'EOF' > pr_body.txt
          ${{ github.event.pull_request.body }}
          EOF
          
          # Extract content between "## Release" and "---"
          sed -n '/^## Release/,/^---/p' pr_body.txt | sed '1d;$d' > release_notes.md
          
          # If no release notes found, use default
          if [ ! -s release_notes.md ]; then
            echo "Release v${{ steps.version.outputs.version }}" > release_notes.md
            echo "" >> release_notes.md
            echo "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details." >> release_notes.md
          fi
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: false